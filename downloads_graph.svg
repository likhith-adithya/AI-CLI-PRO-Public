<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="areaGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#4facfe;stop-opacity:0.3" />
            <stop offset="100%" style="stop-color:#4facfe;stop-opacity:0" />
        </linearGradient>
        <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
            <feOffset dx="0" dy="2" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>
    
    <!-- Background -->
    <rect width="100%" height="100%" fill="transparent"/>
    
    <!-- Grid Lines -->
    <line x1="50" y1="160" x2="550" y2="160" stroke="#333" stroke-width="1" />
    <line x1="50" y1="40" x2="550" y2="40" stroke="#222" stroke-width="1" stroke-dasharray="4" />
    
    <!-- Area Fill -->
    <polygon points="50,160 50.0,157.02970297029702 150.0,136.60891089108912 250.0,115.44554455445544 350.0,96.13861386138613 450.0,74.35643564356434 550.0,61.980198019801975 550,160" fill="url(#areaGrad)" />
    
    <!-- Line -->
    <polyline points="50.0,157.02970297029702 150.0,136.60891089108912 250.0,115.44554455445544 350.0,96.13861386138613 450.0,74.35643564356434 550.0,61.980198019801975" fill="none" stroke="url(#lineGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
    
    <!-- Data Points -->
    <circle cx="550.0" cy="61.980198019801975" r="6" fill="#00f2fe" filter="url(#shadow)" />
    
    <!-- Labels -->
    <text x="550" y="30" font-family="Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#00f2fe" text-anchor="end">888 Total Installs</text>
    <text x="50" y="190" font-family="Segoe UI, sans-serif" font-size="12" fill="#888" text-anchor="start">Growth History (Global)</text>
    <text x="550" y="190" font-family="Segoe UI, sans-serif" font-size="10" fill="#555" text-anchor="end">Real-time Tracker</text>
    </svg>